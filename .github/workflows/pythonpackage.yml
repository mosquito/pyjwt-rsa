name: tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  FORCE_COLOR: 1

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run ruff check
        run: uv run ruff check jwt_rsa tests

      - name: Run ruff format check
        run: uv run ruff format --check jwt_rsa tests

  mypy:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Setup python3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run mypy
        run: uv run mypy jwt_rsa

  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false

      matrix:
        include:
          - python: '3.10'
          - python: '3.11'
          - python: '3.12'
          - python: '3.13'

    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Setup python${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: "${{ matrix.python }}"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest
